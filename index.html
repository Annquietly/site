<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio of Anya Russkikh — graphic designer, digital product designer and visual concept creator."
    />
    <title>Anya Russkikh — Designer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="assets/data/projects.js" defer></script>
    <script src="components/Header.js" defer></script>
    <script src="components/Footer.js" defer></script>
    <script src="components/ProjectCard.js" defer></script>
    <script src="script.js" defer></script>
  </head>
  <body data-page="home">
    <div class="page-transition" aria-hidden="true"></div>
    <div data-header></div>
    <main>
      <section class="hero" id="home">
        <div
          class="background-object shape-flower"
          data-speed="-0.08"
          aria-hidden="true"
        ></div>
        <div
          class="background-object shape-orbit"
          data-speed="0.1"
          aria-hidden="true"
        ></div>
        <div class="hero-photos" aria-hidden="true">
          <img
            class="hero-photo hero-photo--portrait"
            src="assets/photo/im123.png"
            alt=""
            data-mouse-depth="0.028"
          /><img
            class="hero-photo hero-photo--magazine"
            src="assets/photo/12dw.png"
            alt=""
            data-mouse-depth="0.055"
          /><img
            class="hero-photo hero-photo--laptop"
            src="assets/photo/Group%2013019svsv.png"
            alt=""
            data-mouse-depth="0.042"
          /><img
            class="hero-photo hero-photo--phones"
            src="assets/photo/1342.png"
            alt=""
            data-mouse-depth="0.065"
          />
        </div>
        <div class="hero-copy reveal">
          <p class="eyebrow">Open to collaboration · 2026</p>
          <h1
            class="hero-title variable-proximity no-select"
            data-proximity
            aria-label="Hello, I’m Anya graphic designer"
          >
            <span
              class="hero-title__line proximity-line"
              data-proximity-text="Hello,"
            ></span
            ><span
              class="hero-title__line italic proximity-line"
              data-proximity-text="I’m Anya"
            ></span
            ><span
              class="hero-title__line proximity-line"
              data-proximity-text="graphic designer"
            ></span>
          </h1>
        </div>
        <div class="hero-bottom reveal reveal-delay-1">
          <p class="hero-intro">
            I design digital products and visual concepts with clarity,
            character, and attention to detail. With more than three years of
            professional experience, I combine a graphic design foundation with
            modern tools and AI-assisted workflows.
          </p>
        </div>
      </section>
      <section class="selected-work selected-work--home" id="work">
        <div class="section-heading reveal">
          <p class="eyebrow">Selected work</p>
        </div>
        <div class="projects-cards" data-home-project-cards></div>
      </section>
      <section class="home-work-more">
        <a class="text-link reveal" href="work.html">More ↗</a>
      </section>
    </main>
    <div data-footer></div>
  </body>
</html>
