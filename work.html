<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Selected work by Anya Russkikh." />
    <title>Work — Anya Russkikh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="assets/data/projects.js" defer></script>
    <script src="components/Header.js" defer></script>
    <script src="components/Footer.js" defer></script>
    <script src="components/ProjectCard.js" defer></script>
    <script src="script.js" defer></script>
  </head>
  <body data-page="work">
    <div class="page-transition" aria-hidden="true"></div>
    <div data-header></div>
    <main>
      <section class="selected-work" id="work">
        <nav
          class="project-filters reveal"
          aria-label="Project filters"
          data-project-filters
        >
          <button type="button" class="is-active" data-filter="All Projects">
            All Projects</button
          ><button type="button" data-filter="Site Design">Site Design</button
          ><button type="button" data-filter="Mobile app">Mobile app</button
          ><button type="button" data-filter="Brand Identity">
            Brand Identity</button
          ><button type="button" data-filter="Social Media Design">
            Social Media Design</button
          ><button type="button" data-filter="Other">Other</button>
        </nav>
        <div class="projects-cards" data-project-cards></div>
      </section>
    </main>
    <div data-footer></div>
  </body>
</html>
